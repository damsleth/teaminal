name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run when a new commit lands on the same PR/branch.
# Saves runner minutes during rapid iteration.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        bun: [1.x]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun ${{ matrix.bun }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test (with coverage)
        run: bun test --coverage

      - name: Format check
        run: bunx prettier --check "**/*.{ts,tsx,json,md}"

  tui-test:
    name: tui-test flows (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # tui-test requires a PTY — only macOS and Linux are supported under Bun.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        bun: [1.x]
    env:
      # Tell the seeded app and tui-test config that we are in CI.
      CI: '1'
      TEAMINAL_SEED: fixtures
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun ${{ matrix.bun }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tui-test flows (seeded app, no auth)
        # Gate only on text/color .snap snapshot failures (Decision 4 in the plan).
        # PNG/SVG artifacts are uploaded separately and are never a pass/fail gate.
        # tui-test must run via Node — Bun's child_process.fork() deadlocks the
        # workerpool IPC protocol used by the runner (see tui-test.config.ts note).
        run: node node_modules/@microsoft/tui-test/index.js
        continue-on-error: false

      - name: Upload PNG/SVG visual artifacts
        # Always upload visuals so reviewers can inspect the rendered TUI even on failure.
        # These are never the pass/fail gate — only text .snap files are.
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: tui-shots-${{ matrix.os }}-${{ github.run_number }}
          path: |
            .tui-loop/shots/**/*.png
            .tui-loop/shots/**/*.svg
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload tui-test traces
        # Traces are recorded for every test (trace: true in tui-test.config.ts)
        # and allow replaying a failing test locally with --trace.
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: tui-traces-${{ matrix.os }}-${{ github.run_number }}
          path: .tui-test/
          if-no-files-found: ignore
          retention-days: 14
