name: Release

# Tag-driven release workflow for single-file Bun executables. Builds all
# published platforms, packages macOS/Linux as .tar.gz, Windows as .zip,
# writes SHA256SUMS.txt, and attaches every artifact to the GitHub Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version to use for artifact names, e.g. v0.12.0'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build release binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build release binaries
        run: ./scripts/build-release.sh

      - name: Package archives
        id: package
        run: |
          set -euo pipefail
          input_tag="${{ github.event.inputs.tag }}"
          tag_name="${input_tag:-${GITHUB_REF_NAME:-}}"
          if [[ -z "${tag_name}" ]]; then tag_name="dev-$(date +%Y%m%d%H%M%S)"; fi
          version="${tag_name#v}"
          echo "tag=${tag_name}" >> "$GITHUB_OUTPUT"

          archives_dir="$GITHUB_WORKSPACE/dist/release-archives"
          mkdir -p "$archives_dir"

          for platform_dir in dist/release/*; do
            platform="$(basename "$platform_dir")"
            archive_base="teaminal-${version}-${platform}"
            if [[ "$platform" == windows-* ]]; then
              (cd "$platform_dir" && zip -9 "$archives_dir/${archive_base}.zip" teaminal.exe)
            else
              tar -C "$platform_dir" -czf "$archives_dir/${archive_base}.tar.gz" teaminal
            fi
          done

          cd "$archives_dir"
          shasum -a 256 * > SHA256SUMS.txt
          ls -la

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: teaminal-${{ steps.package.outputs.tag }}
          path: dist/release-archives/*
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release-archives/*
          generate_release_notes: true
          fail_on_unmatched_files: true
